<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tải Video Douyin Trả Phí- Beta</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <img src="/favicon.png" alt="Douyin Video Downloader" class="logo-img" width="40" height="40">
      </div>
      <div class="header-text">
        <h1>Douyin Video Downloader</h1>
        <span class="badge">BETA</span>
      </div>
    </header>

    <main class="main-content">
      <section class="input-section input-section-full">
        <label class="section-label">Nhập URL Douyin</label>
        <textarea 
          id="urlInput" 
          class="url-input" 
          placeholder="Dán link douyin vào đây..."
          rows="2"
        ></textarea>
        <div class="button-row">
          <button id="getInfoBtn" class="btn btn-primary" type="button">
            <span class="btn-text">Lấy Thông Tin</span>
            <span class="btn-loading"><span class="spinner"></span> Đang xử lý...</span>
          </button>
          <button id="clearBtn" class="btn btn-secondary" type="button">Xóa</button>
        </div>
        <div id="statusMessage" class="status-message"></div>
      </section>

      <div class="two-col">
        <section id="videoInfoSection" class="video-info-section hidden">
          <div class="info-header">
            <h2>Thông Tin Video</h2>
          </div>
          <div class="thumbnail-container">
            <img id="thumbnailPreview" class="thumbnail-preview" alt="Thumbnail" />
            <div id="thumbnailPlaceholder" class="thumbnail-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
            </div>
          </div>
          <div class="info-grid">
            <div class="info-item">
              <span class="info-label">Tiêu đề</span>
              <span id="videoTitle" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">Likes</span>
              <span id="videoLikes" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">Bình luận</span>
              <span id="videoComments" class="info-value">-</span>
            </div>
            <div class="info-item">
              <span class="info-label">Chia sẻ</span>
              <span id="videoShares" class="info-value">-</span>
            </div>
          </div>
          <div class="download-section">
            <div class="output-dir-section">
              <label class="section-label">Nơi lưu</label>
              <div class="output-dir-row">
                <input type="text" id="outputDir" class="output-dir-input" readonly placeholder="Mặc định (Downloads)" />
                <button id="selectDirBtn" class="btn btn-small btn-icon" title="Chọn thư mục lưu">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </button>
              </div>
            </div>
            <div id="progressSection" class="progress-section hidden">
              <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
              </div>
              <span id="progressText" class="progress-text">0%</span>
            </div>
            <button id="downloadBtn" class="btn btn-download hidden" type="button">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7,10 12,15 17,10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              <span>Tải Video</span>
            </button>
          </div>
        </section>

        <div class="right-col">
          <section class="log-section">
            <div class="section-header">
              <h2>Log</h2>
            </div>
            <div id="logPanel" class="log-panel">
              <div id="logContent" class="log-content"></div>
              <div id="logLoading" class="log-loading hidden">
                <span class="spinner"></span>
                <span id="logLoadingText">Đang chờ...</span>
              </div>
            </div>
          </section>
          <section class="history-section">
            <div class="section-header">
              <h2>Lịch Sử Tải</h2>
              <button id="clearHistoryBtn" class="btn btn-text" type="button">Xóa lịch sử</button>
            </div>
            <div id="historyList" class="history-list">
              <div class="history-empty">Chưa có video nào được tải</div>
            </div>
          </section>
          <section class="stats-section">
            <div class="stats-grid">
              <div class="stat-card">
                <span class="stat-value" id="totalDownloaded">0</span>
                <span class="stat-label">Đã tải</span>
              </div>
              <div class="stat-card">
                <span class="stat-value" id="totalFailed">0</span>
                <span class="stat-label">Thất bại</span>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Douyin Video Downloader - Beta v1.0.0 </p><br>

    </footer>
  </div>

  <div id="notification" class="notification hidden">
    <span id="notificationText"></span>
  </div>

  <script src="/js/app.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"acf8e78954b74a69b52a44994b116a98","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
